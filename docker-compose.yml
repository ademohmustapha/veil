# AURORA — Docker Compose (Production)
# Usage: docker-compose up -d
version: "3.9"

services:
  aurora:
    build:
      context: .
      dockerfile: Dockerfile
    image: aurora:latest
    container_name: aurora
    restart: unless-stopped
    ports:
      - "127.0.0.1:9100:9100"   # Bind to localhost only — put nginx/Caddy in front
    volumes:
      - aurora-data:/home/aurora/.aurora   # Keys, genome, audit log, config
    environment:
      - AURORA_HOME=/home/aurora/.aurora
      - AURORA_API_HOST=0.0.0.0
      - AURORA_API_PORT=9100
      - AURORA_LOG_LEVEL=INFO
      # ── Native TLS (set AURORA_API_TLS_ENABLED=true to activate HTTPS) ──
      - AURORA_API_TLS_ENABLED=false              # flip to true for native HTTPS
      # - AURORA_API_TLS_CERT_FILE=/run/secrets/aurora_cert  # BYOC cert
      # - AURORA_API_TLS_KEY_FILE=/run/secrets/aurora_key    # BYOC key
      # ── Storage Backend ────────────────────────────────────────────────────
      - AURORA_STORAGE_BACKEND=sqlite         # sqlite | postgresql
      # PostgreSQL (only used when AURORA_STORAGE_BACKEND=postgresql)
      # - AURORA_PG_DSN=postgresql://aurora:secret@db:5432/aurora?sslmode=require
      # Or individually:
      # - AURORA_PG_HOST=db
      # - AURORA_PG_PORT=5432
      # - AURORA_PG_USER=aurora
      # - AURORA_PG_PASS=secret
      # - AURORA_PG_DB=aurora
      # - AURORA_PG_SSLMODE=require
      # - AURORA_PG_POOL_MIN=2
      # - AURORA_PG_POOL_MAX=20
      # - AURORA_SLACK_WEBHOOK=https://hooks.slack.com/services/...
      # - AURORA_PD_ROUTING_KEY=your_pagerduty_routing_key
      # - AURORA_SMTP_USER=alerts@example.com
      # - AURORA_SMTP_PASS=your_smtp_password
    command: ["api"]
    healthcheck:
      test: ["CMD", "python3", "aurora.py", "doctor", "--json"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    cap_drop:
      - ALL
    networks:
      - aurora-net

volumes:
  aurora-data:
    driver: local

networks:
  aurora-net:
    driver: bridge
    internal: false   # Set to true if behind reverse proxy with no direct internet
